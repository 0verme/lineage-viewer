name: Bug report
description: Report a reproducible problem with the viewer, adapters, package, or demo.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include production metadata, credentials, internal URLs, or personal data.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Web Component
        - Demo or Playground
        - SQLGlot adapter
        - OpenLineage adapter
        - Packaging or documentation
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Provide minimal JSON or a repository that contains no confidential data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
