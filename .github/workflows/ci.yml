name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: npm ci
      - name: Install SQLGlot adapter
        run: python -m pip install -e "packages/adapter-sqlglot[dev]"
      - name: Install OpenLineage adapter
        run: python -m pip install -e "packages/adapter-openlineage[dev]"
      - name: Check formatting
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Run unit tests
        run: npm test
      - name: Test SQLGlot adapter
        run: npm run test:adapter-sqlglot
      - name: Lint SQLGlot adapter
        run: npm run lint:adapter-sqlglot
      - name: Test OpenLineage adapter
        run: npm run test:adapter-openlineage
      - name: Lint OpenLineage adapter
        run: npm run lint:adapter-openlineage
      - name: Validate release helpers and workflows
        run: npm run test:release && npm run test:workflows
      - name: Build package
        run: npm run build
      - name: Build site
        run: npm run build:site
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Test package consumers
        run: npm run test:package
      - name: Validate package contents
        run: npm run pack:check && npm pack --dry-run

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke test
        run: npm run test:e2e
      - name: Run production site browser regression test
        run: npm run test:e2e:site
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
